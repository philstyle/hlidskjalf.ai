<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NexusRelay — Org Overview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #0d1117; color: #c9d1d9; line-height: 1.5; }
  .container { max-width: 100%; margin: 0 auto; padding: 16px 24px; }

  /* Header */
  .header { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #21262d; margin-bottom: 16px; }
  .header h1 { font-size: 18px; font-weight: 600; color: #f0f6fc; }
  .header h1 a { color: #8b949e; text-decoration: none; font-weight: 400; font-size: 13px; margin-left: 12px; }
  .header h1 a:hover { color: #c9d1d9; }
  .header-right { display: flex; align-items: center; gap: 12px; font-size: 13px; color: #8b949e; }
  .header-right button { background: none; border: 1px solid #30363d; color: #8b949e; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; }
  .header-right button:hover { border-color: #8b949e; color: #c9d1d9; }

  /* Login */
  .login { text-align: center; padding: 80px 20px; }
  .login h2 { font-size: 20px; color: #f0f6fc; margin-bottom: 8px; }
  .login p { color: #8b949e; margin-bottom: 20px; font-size: 14px; }
  .login input { background: #161b22; border: 1px solid #30363d; color: #c9d1d9; padding: 8px 14px; border-radius: 6px; width: 400px; max-width: 90%; font-size: 14px; font-family: monospace; }
  .login input:focus { outline: none; border-color: #58a6ff; }
  .login .btn { background: #238636; border: none; color: #fff; padding: 8px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; margin-left: 8px; }
  .login .error { color: #f85149; margin-top: 12px; font-size: 13px; }

  /* Stats summary bar */
  .stats-bar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .stat-pill { background: #161b22; border: 1px solid #21262d; border-radius: 20px; padding: 6px 14px; font-size: 12px; color: #8b949e; }
  .stat-pill strong { color: #f0f6fc; margin-right: 4px; }

  /* Namespace container */
  .ns-container { margin-bottom: 20px; }
  .ns-header { font-size: 14px; font-weight: 600; color: #f0f6fc; padding: 8px 0 6px 0; display: flex; align-items: center; gap: 8px; }
  .ns-stripe { width: 4px; height: 18px; border-radius: 2px; }

  /* Host group */
  .host-group { margin-left: 12px; margin-bottom: 12px; }
  .host-label { font-size: 11px; color: #484f58; text-transform: uppercase; letter-spacing: 0.5px; padding: 4px 0; }

  /* Card grid */
  .card-grid { display: flex; flex-wrap: wrap; gap: 8px; }

  /* Agent card */
  .agent-card { width: 220px; min-height: 90px; background: #161b22; border: 1px solid #21262d; border-radius: 10px; padding: 10px 12px; cursor: pointer; transition: border-color 0.15s, transform 0.1s; position: relative; display: flex; flex-direction: column; justify-content: space-between; }
  .agent-card:hover { border-color: #58a6ff; transform: translateY(-1px); }
  .agent-card.selected { border-color: #58a6ff; background: #1c2128; }

  .card-name { font-size: 12px; font-family: monospace; color: #c9d1d9; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 600; }
  .card-meta { font-size: 10px; color: #484f58; margin-top: 3px; }
  .card-desc { font-size: 10px; color: #7ee787; font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
  .card-bottom { display: flex; justify-content: space-between; align-items: flex-end; margin-top: 6px; }

  /* Online dot */
  .online-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 4px; vertical-align: middle; }
  .online-dot.on { background: #3fb950; }
  .online-dot.off { background: #484f58; }

  /* Sparkline */
  .sparkline svg { display: block; }

  /* Badges */
  .badge { font-size: 9px; padding: 1px 5px; border-radius: 6px; margin-left: 4px; }
  .badge-op { background: #2a1f3f; color: #bc8cff; }
  .badge-pact { background: #1a3a2a; color: #3fb950; }
  .badge-channel { background: #1a3a2a; color: #3fb950; }

  /* Message panel (flyout) */
  .flyout { position: fixed; right: 0; top: 0; width: 420px; height: 100vh; background: #161b22; border-left: 1px solid #21262d; z-index: 50; overflow-y: auto; display: none; flex-direction: column; }
  .flyout.open { display: flex; }
  .flyout-header { padding: 14px 16px; border-bottom: 1px solid #21262d; display: flex; justify-content: space-between; align-items: center; }
  .flyout-header h3 { font-size: 14px; color: #f0f6fc; font-family: monospace; }
  .flyout-close { background: none; border: none; color: #8b949e; cursor: pointer; font-size: 18px; }
  .flyout-body { flex: 1; overflow-y: auto; padding: 8px; }
  .flyout-compose { padding: 10px; border-top: 1px solid #21262d; }
  .flyout-compose textarea { width: 100%; background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; padding: 6px 8px; border-radius: 6px; font-size: 12px; resize: none; min-height: 32px; font-family: inherit; }
  .flyout-compose textarea:focus { outline: none; border-color: #58a6ff; }
  .flyout-compose-row { display: flex; gap: 6px; margin-top: 6px; }
  .flyout-compose select { background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; padding: 4px 6px; border-radius: 4px; font-size: 11px; }
  .flyout-compose .send-btn { background: #238636; border: none; color: #fff; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }

  /* Message items */
  .msg { padding: 8px 10px; margin: 3px 0; border-radius: 6px; background: #0d1117; border: 1px solid #21262d; }
  .msg-top { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 3px; }
  .msg-sender { color: #58a6ff; font-family: monospace; }
  .msg-time { color: #484f58; }
  .msg-type { font-size: 9px; padding: 1px 5px; border-radius: 6px; background: #21262d; color: #8b949e; margin-left: 4px; }
  .msg-body { font-size: 12px; color: #c9d1d9; white-space: pre-wrap; word-break: break-word; }

  /* Channels section */
  .channels-section { margin-top: 16px; }
  .channels-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
  .channel-card { width: 180px; background: #161b22; border: 1px solid #21262d; border-radius: 10px; padding: 10px 12px; cursor: pointer; transition: border-color 0.15s; }
  .channel-card:hover { border-color: #3fb950; }
  .channel-card.selected { border-color: #3fb950; background: #1c2128; }
  .channel-name { font-size: 13px; color: #3fb950; font-family: monospace; font-weight: 600; }
  .channel-desc { font-size: 10px; color: #8b949e; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .channel-meta { font-size: 10px; color: #484f58; margin-top: 3px; }

  @media (max-width: 768px) {
    .agent-card { width: 100%; }
    .channel-card { width: 100%; }
    .flyout { width: 100%; }
  }
</style>
</head>
<body>
<div class="container" id="main-container">
  <div class="header">
    <h1>NexusRelay <a href="/dashboard">Classic View</a></h1>
    <div class="header-right" id="header-right"></div>
  </div>
  <div id="app"></div>
</div>
<div class="flyout" id="flyout"></div>

<script>
const BASE = window.location.origin;
let token = localStorage.getItem('relay_token') || '';
let refreshTimer = null;
let participantMap = {};
let selectedId = null;
let selectedType = null; // 'participant' or 'channel'
let msgTimer = null;

function $(id) { return document.getElementById(id); }

const NS_COLORS = ['#3fb950','#58a6ff','#bc8cff','#e3b341','#56d4dd','#f85149','#d2a8ff','#79c0ff'];
let nsColorMap = {};
let nsColorIdx = 0;
function nsColor(ns) {
  if (!nsColorMap[ns]) nsColorMap[ns] = NS_COLORS[nsColorIdx++ % NS_COLORS.length];
  return nsColorMap[ns];
}

function heatBg(lastActiveAt) {
  if (!lastActiveAt) return '#161b22';
  const min = (Date.now() - new Date(lastActiveAt).getTime()) / 60000;
  if (min < 1) return '#1a3d1a';   // hot green — active now
  if (min < 5) return '#1a3528';   // warm green-teal
  if (min < 15) return '#2a2a1a';  // warm amber tint
  if (min < 60) return '#252018';  // fading amber
  if (min < 240) return '#1e1a18'; // cooling brown
  if (min < 1440) return '#1a1a1e'; // cool blue-grey
  return '#161b22';                // cold — default
}
function heatBorder(lastActiveAt) {
  if (!lastActiveAt) return '#21262d';
  const min = (Date.now() - new Date(lastActiveAt).getTime()) / 60000;
  if (min < 1) return '#3fb950';   // bright green border
  if (min < 5) return '#2ea043';   // green
  if (min < 15) return '#d29922';  // amber
  if (min < 60) return '#8b6914';  // dim amber
  if (min < 240) return '#30302a'; // faint warm
  return '#21262d';                // default border
}

function timeAgo(iso) {
  if (!iso) return 'never';
  const s = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
  if (s < 60) return s + 's';
  if (s < 3600) return Math.floor(s/60) + 'm';
  if (s < 86400) return Math.floor(s/3600) + 'h';
  return Math.floor(s/86400) + 'd';
}

function fmt(n) { return n != null ? n.toLocaleString() : '0'; }
function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function sparkSvg(data, w, h, color) {
  if (!data || !data.length) return '';
  var max = Math.max(...data, 1);
  var step = w / Math.max(data.length - 1, 1);
  var pts = data.map(function(v,i) {
    return (i*step).toFixed(1)+','+(h-(v/max)*(h-2)-1).toFixed(1);
  }).join(' ');
  return '<svg class="sparkline" width="'+w+'" height="'+h+'"><polyline fill="none" stroke="'+color+'" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" points="'+pts+'" /></svg>';
}

function payloadText(p) {
  if (!p) return '';
  if (typeof p === 'string') return p;
  if (p.message) return p.message;
  if (p.body) return (p.title ? p.title+': ':'')+p.body;
  if (p.title) return p.title;
  return JSON.stringify(p, null, 2);
}

// --- Login ---
function renderLogin(err) {
  $('header-right').innerHTML = '';
  $('app').innerHTML = '<div class="login"><h2>Org Overview</h2><p>Enter your relay token.</p><form onsubmit="doLogin(event)"><input type="password" id="token-input" placeholder="nrr_ / nra_ / nrp_ token"><button type="submit" class="btn">Connect</button></form>'+(err?'<p class="error">'+err+'</p>':'')+'</div>';
  var inp = $('token-input'); if (inp) inp.focus();
}
async function doLogin(e) {
  e.preventDefault();
  token = $('token-input').value.trim();
  if (!token) return;
  try {
    var r = await fetch(BASE+'/stats',{headers:{'Authorization':'Bearer '+token}});
    if (r.status===401){renderLogin('Invalid token.');token='';return;}
    if (!r.ok){renderLogin('Error: '+r.status);token='';return;}
    localStorage.setItem('relay_token',token);
    startDashboard();
  } catch(e){renderLogin('Connection failed.');token='';}
}
function logout() {
  token=''; selectedId=null; selectedType=null;
  localStorage.removeItem('relay_token');
  if (refreshTimer) clearInterval(refreshTimer);
  if (msgTimer) clearInterval(msgTimer);
  closeFlyout();
  renderLogin();
}

async function apiFetch(path) {
  try {
    var r = await fetch(BASE+path,{headers:{'Authorization':'Bearer '+token}});
    if (r.status===401){logout();return null;}
    if (!r.ok) return null;
    return r.json();
  } catch(e){return null;}
}

async function apiPost(path, body) {
  try {
    var r = await fetch(BASE+path,{method:'POST',headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify(body)});
    if (r.status===401){logout();return null;}
    var d = await r.json();
    if (!r.ok) d.error = d.error||'failed';
    return d;
  } catch(e){return null;}
}

// --- Flyout ---
function openFlyout(id, name, type) {
  selectedId = id; selectedType = type;
  document.querySelectorAll('.agent-card,.channel-card').forEach(c=>c.classList.remove('selected'));
  var el = document.querySelector('[data-card-id="'+id+'"]');
  if (el) el.classList.add('selected');
  var fly = $('flyout');
  fly.innerHTML = '<div class="flyout-header"><h3>'+esc(name)+'</h3><button class="flyout-close" onclick="closeFlyout()">&times;</button></div><div class="flyout-body" id="flyout-body"><div style="padding:20px;color:#484f58;">Loading...</div></div><div class="flyout-compose"><textarea id="fly-text" placeholder="Message..." rows="1" onkeydown="if(event.key===\'Enter\'&&!event.shiftKey){event.preventDefault();flySend()}"></textarea><div class="flyout-compose-row"><select id="fly-type"><option value="task">task</option><option value="query">query</option><option value="result">result</option><option value="feedback">feedback</option><option value="escalation">escalation</option><option value="ack">ack</option></select><button class="send-btn" onclick="flySend()">Send</button></div></div>';
  fly.classList.add('open');
  loadFlyoutMessages();
  if (msgTimer) clearInterval(msgTimer);
  msgTimer = setInterval(loadFlyoutMessages, 5000);
}
function closeFlyout() {
  $('flyout').classList.remove('open');
  selectedId=null; selectedType=null;
  if (msgTimer) clearInterval(msgTimer);
  document.querySelectorAll('.agent-card,.channel-card').forEach(c=>c.classList.remove('selected'));
}

async function loadFlyoutMessages() {
  if (!selectedId) return;
  var headPath, readPath;
  if (selectedType==='channel') {
    headPath='/channels/'+encodeURIComponent(selectedId)+'/head';
    readPath='/channels/'+encodeURIComponent(selectedId)+'/read';
  } else {
    headPath='/ledger/'+selectedId+'/head';
    readPath='/ledger/'+selectedId+'/read';
  }
  var head = await apiFetch(headPath);
  var since = 0;
  if (head && head.sequence > 50) since = head.sequence - 50;
  var data = await apiFetch(readPath+'?since='+since+'&limit=50');
  if (!data) return;
  if (data.sender_names) { for (var k in data.sender_names) participantMap[k] = data.sender_names[k]; }
  var body = $('flyout-body');
  if (!body) return;
  var entries = data.entries || [];
  if (entries.length===0) { body.innerHTML='<div style="padding:20px;color:#484f58;">No messages</div>'; return; }
  var html = '';
  for (var e of entries.slice().reverse()) {
    var sender = participantMap[e.sender_id] || e.sender_id.substring(0,8);
    html += '<div class="msg"><div class="msg-top"><span><span class="msg-sender">'+esc(sender)+'</span><span class="msg-type">'+e.msg_type+'</span></span><span class="msg-time">'+timeAgo(e.received_at)+'</span></div><div class="msg-body">'+esc(payloadText(e.payload))+'</div></div>';
  }
  body.innerHTML = html;
}

async function flySend() {
  var text = $('fly-text');
  var type = $('fly-type');
  if (!text||!text.value.trim()||!selectedId) return;
  var path = selectedType==='channel'
    ? '/channels/'+encodeURIComponent(selectedId)+'/append'
    : '/ledger/'+selectedId+'/append';
  var result = await apiPost(path, {msg_type:type.value, payload:{message:text.value.trim()}});
  if (result&&!result.error) text.value='';
  loadFlyoutMessages();
}

// --- Main render ---
async function refresh() {
  var ind = $('refresh-ind');
  if (ind) ind.style.color='#d29922';
  var [stats, topology, channels, activity] = await Promise.all([
    apiFetch('/stats'), apiFetch('/stats/topology'), apiFetch('/channels'), apiFetch('/stats/activity')
  ]);
  if (!stats||!topology) return;

  // Build participant map
  participantMap = {};
  if (topology.namespaces) {
    for (var ns of topology.namespaces) {
      for (var p of ns.participants) participantMap[p.id] = p.display_name;
    }
  }

  // Build sparkline data
  var perLedger = (activity && activity.per_ledger) || {};
  function getSparkData(id) {
    if (!perLedger[id]) return null;
    var entries = perLedger[id];
    var now = new Date();
    var buckets = new Array(24).fill(0);
    for (var d of entries) {
      var h = new Date(d.hour);
      var hoursAgo = Math.floor((now-h)/3600000);
      if (hoursAgo>=0 && hoursAgo<24) buckets[23-hoursAgo] = d.count;
    }
    return buckets.every(v=>v===0) ? null : buckets;
  }

  var prefix = token.substring(0,4);
  $('header-right').innerHTML = '<span>token: <code>'+prefix+'****</code></span><span id="refresh-ind" style="color:#3fb950">&#9679;</span><button onclick="logout()">Logout</button>';

  // Stats bar
  var totalOnline = 0;
  topology.namespaces.forEach(ns=>ns.participants.forEach(p=>{if(p.online)totalOnline++;}));
  var statsHtml = '<div class="stats-bar">';
  statsHtml += '<span class="stat-pill"><strong>'+fmt(stats.messages.total)+'</strong> messages</span>';
  statsHtml += '<span class="stat-pill"><strong>'+stats.participants.active+'</strong> active</span>';
  statsHtml += '<span class="stat-pill"><strong>'+totalOnline+'</strong> online</span>';
  statsHtml += '<span class="stat-pill"><strong>'+stats.namespaces+'</strong> namespaces</span>';
  statsHtml += '<span class="stat-pill"><strong>'+fmt(stats.messages.last_hour)+'</strong> /hr</span>';
  statsHtml += '</div>';

  // Namespace cards
  var cardsHtml = '';
  for (var ns of topology.namespaces) {
    var color = nsColor(ns.name);
    cardsHtml += '<div class="ns-container"><div class="ns-header"><span class="ns-stripe" style="background:'+color+'"></span>'+esc(ns.name)+'</div>';

    // Group by host
    var hosts = {};
    for (var p of ns.participants) {
      if (p.status !== 'active') continue;
      var parts = p.display_name.split('/');
      var host = parts.length >= 2 ? parts[1] : '(operator)';
      if (p.is_operator) host = '(operator)';
      if (!hosts[host]) hosts[host] = [];
      hosts[host].push(p);
    }

    for (var host in hosts) {
      cardsHtml += '<div class="host-group"><div class="host-label">'+esc(host)+'</div><div class="card-grid">';
      for (var p of hosts[host]) {
        var shortName = p.display_name.split('/').pop() || p.display_name;
        var bg = heatBg(p.ledger.last_received_at);
        var bc = heatBorder(p.ledger.last_received_at);
        var dotCls = p.online ? 'on' : 'off';
        var spark = getSparkData(p.id);
        var sparkHtml = spark ? sparkSvg(spark, 80, 14, '#8b949e') : '';
        var badge = p.is_operator ? '<span class="badge badge-op">operator</span>' : '';
        var sel = selectedId===p.id ? ' selected' : '';
        cardsHtml += '<div class="agent-card'+sel+'" data-card-id="'+p.id+'" style="background:'+bg+';border-color:'+bc+';" onclick="openFlyout(\''+p.id+'\',\''+esc(p.display_name).replace(/'/g,"\\'")+'\',\'participant\')">';
        cardsHtml += '<div><span class="online-dot '+dotCls+'"></span><span class="card-name">'+esc(shortName)+badge+'</span>';
        cardsHtml += '<div class="card-meta">'+fmt(p.ledger.message_count)+' msgs &middot; last msg '+timeAgo(p.ledger.last_received_at)+'</div>';
        if (p.description) cardsHtml += '<div class="card-desc">'+esc(p.description)+'</div>';
        cardsHtml += '</div>';
        cardsHtml += '<div class="card-bottom">'+sparkHtml+'</div>';
        cardsHtml += '</div>';
      }
      cardsHtml += '</div></div>';
    }
    cardsHtml += '</div>';
  }

  // Channels
  var chList = channels || [];
  if (chList.length > 0) {
    cardsHtml += '<div class="channels-section"><div class="ns-header"><span class="ns-stripe" style="background:#3fb950"></span>Channels</div><div class="channels-grid">';
    for (var ch of chList) {
      var chBg = heatBg(ch.last_received_at);
      var chBc = heatBorder(ch.last_received_at);
      var sel = (selectedType==='channel' && selectedId===ch.name) ? ' selected' : '';
      cardsHtml += '<div class="channel-card'+sel+'" data-card-id="'+ch.name+'" style="background:'+chBg+';border-color:'+chBc+';" onclick="openFlyout(\''+esc(ch.name).replace(/'/g,"\\'")+'\',\'#'+esc(ch.name).replace(/'/g,"\\'")+'\',\'channel\')">';
      cardsHtml += '<div class="channel-name">#'+esc(ch.name)+'</div>';
      if (ch.description) cardsHtml += '<div class="channel-desc">'+esc(ch.description)+'</div>';
      cardsHtml += '<div class="channel-meta">'+fmt(ch.message_count)+' msgs &middot; '+timeAgo(ch.last_received_at)+'</div>';
      cardsHtml += '</div>';
    }
    cardsHtml += '</div></div>';
  }

  $('app').innerHTML = statsHtml + cardsHtml;
  if (ind) { ind.style.color='#3fb950'; setTimeout(()=>{if(ind)ind.style.color='#484f58';},500); }
}

function startDashboard() {
  refresh();
  if (refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(refresh, 15000);
}

if (token) { startDashboard(); } else { renderLogin(); }
</script>
</body>
</html>
